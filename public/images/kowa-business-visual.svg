<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <defs>
    <linearGradient id="gradRecycle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dca66a; stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#b5732a; stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="gradTrade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9dd6; stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#2c669e; stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="gradEco" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6cbf73; stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#358c3c; stop-opacity:0.95" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#fbfcfc" rx="15"/>

  <line x1="300" y1="200" x2="410" y2="250" stroke="#b0bec5" stroke-width="2"/>
  <circle cx="300" cy="200" r="5" fill="#78909c"/>

  <line x1="260" y1="460" x2="350" y2="430" stroke="#b0bec5" stroke-width="2"/>
  <circle cx="260" cy="460" r="5" fill="#78909c"/>

  <line x1="740" y1="460" x2="650" y2="430" stroke="#b0bec5" stroke-width="2"/>
  <circle cx="740" cy="460" r="5" fill="#78909c"/>

  <g filter="url(#shadow)">
    <circle cx="500" cy="270" r="135" fill="url(#gradRecycle)" />
    <circle cx="415" cy="420" r="135" fill="url(#gradTrade)" />
    <circle cx="585" cy="420" r="135" fill="url(#gradEco)" />
  </g>

  <text x="500" y="280" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Plastic recycle</text>

  <text x="395" y="415" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Trading</text>
  <text x="395" y="450" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Company</text>

  <text x="605" y="415" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">ECO</text>
  <text x="605" y="450" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Energy</text>

  <text x="280" y="193" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#34495e" text-anchor="end" letter-spacing="0.5">Feature</text>
  <text x="280" y="225" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">◎ Effectively reuse limited resources</text>
  <text x="280" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">◎ Protect the earth from environmental</text>
  <text x="280" y="270" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">destruction</text>

  <text x="240" y="453" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#34495e" text-anchor="end" letter-spacing="0.5">Feature</text>
  <text x="240" y="485" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">◎ Introducing good Japanese</text>
  <text x="240" y="505" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">products overseas</text>
  <text x="240" y="530" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">◎ Triangular trade of recycled</text>
  <text x="240" y="550" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="end">plastic raw materials</text>

  <text x="760" y="453" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#34495e" text-anchor="start" letter-spacing="0.5">Feature</text>
  <text x="760" y="485" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="start">◎ Contribute to the greening</text>
  <text x="760" y="505" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="start">of the earth</text>
  <text x="760" y="530" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="start">◎ Plastic processing, proposals,</text>
  <text x="760" y="550" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#546e7a" text-anchor="start">application development</text>
</svg>
